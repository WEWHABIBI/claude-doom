/* ---------------- track spline system (x,z = ground plane, y = elevation) ---------------- */
function buildSpline(pts, segs){
  const out = [];
  const n = pts.length;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
    for(let t=0;t<segs;t++){
      const tt=t/segs, tt2=tt*tt, tt3=tt2*tt;
      const x = 0.5*((2*p1.x)+(-p0.x+p2.x)*tt+(2*p0.x-5*p1.x+4*p2.x-p3.x)*tt2+(-p0.x+3*p1.x-3*p2.x+p3.x)*tt3);
      const y = 0.5*((2*p1.y)+(-p0.y+p2.y)*tt+(2*p0.y-5*p1.y+4*p2.y-p3.y)*tt2+(-p0.y+3*p1.y-3*p2.y+p3.y)*tt3);
      out.push({x,y});
    }
  }
  return out;
}

function makeTwistyLoop(n, baseR, rx, ry, harmonics){
  const pts=[];
  for(let i=0;i<n;i++){
    const a = i*(Math.PI*2/n);
    let r = baseR;
    for(const h of harmonics) r += h.amp*Math.sin(a*h.freq+h.phase);
    pts.push({ x: Math.cos(a)*r*rx, y: Math.sin(a)*r*ry });
  }
  return pts;
}

function computeTrack(name, controlPoints, width, segsPerSpan, elevAmp, elevFreq){
  const raw = buildSpline(controlPoints, segsPerSpan);
  const n = raw.length;
  const points = raw.map((p,i) => ({
    x: p.x, z: p.y,
    y: elevAmp ? elevAmp*Math.sin((i/n)*Math.PI*2*elevFreq) : 0,
  }));
  const cum = [0];
  let length = 0;
  for(let i=0;i<n;i++){
    const a=points[i], b=points[(i+1)%n];
    length += Math.hypot(b.x-a.x, b.z-a.z);
    cum.push(length);
  }
  const left=[], right=[];
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  for(let i=0;i<n;i++){
    const prev=points[(i-1+n)%n], next=points[(i+1)%n];
    const tx=next.x-prev.x, tz=next.z-prev.z;
    const len=Math.hypot(tx,tz)||1;
    const nx=-tz/len, nz=tx/len;
    left.push({x:points[i].x+nx*width/2, z:points[i].z+nz*width/2, y:points[i].y});
    right.push({x:points[i].x-nx*width/2, z:points[i].z-nz*width/2, y:points[i].y});
    minX=Math.min(minX,points[i].x); maxX=Math.max(maxX,points[i].x);
    minZ=Math.min(minZ,points[i].z); maxZ=Math.max(maxZ,points[i].z);
  }
  return { name, points, left, right, width, n, length, cum, bbox:{minX,maxX,minZ,maxZ} };
}

/* ---------------- procedural textures ---------------- */
function makePatternCanvas(size, base, c1, c2){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const pctx=c.getContext('2d');
  pctx.fillStyle=base; pctx.fillRect(0,0,size,size);
  for(let i=0;i<28;i++){
    pctx.fillStyle = Math.random()<0.5?c1:c2;
    pctx.fillRect((Math.random()*size)|0, (Math.random()*size)|0, 2, 2);
  }
  return c;
}
function makeCanvasTexture(canvas){
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
const asphaltTexture = makeCanvasTexture(makePatternCanvas(32, '#3a3a3d', '#333336', '#46464a'));
const grassTexture = makeCanvasTexture(makePatternCanvas(32, '#265e1f', '#1f5219', '#2c6924'));
grassTexture.repeat.set(80,80);

function makeCarPaintTexture(color){
  const c=document.createElement('canvas'); c.width=c.height=64;
  const ctx=c.getContext('2d');
  ctx.fillStyle=color; ctx.fillRect(0,0,64,64);
  for(let i=0;i<90;i++){
    ctx.fillStyle = `rgba(255,255,255,${Math.random()*0.15})`;
    ctx.fillRect(Math.random()*64, Math.random()*64, 1, 1);
  }
  ctx.fillStyle='rgba(255,255,255,0.55)';
  ctx.fillRect(0,29,64,3);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}
function makeRimTexture(){
  const c=document.createElement('canvas'); c.width=c.height=64;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#161616'; ctx.fillRect(0,0,64,64);
  ctx.fillStyle='#d8d8d8';
  ctx.beginPath(); ctx.arc(32,32,27,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#161616';
  ctx.beginPath(); ctx.arc(32,32,9,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#161616'; ctx.lineWidth=4;
  for(let i=0;i<5;i++){
    const a = i*(Math.PI*2/5);
    ctx.beginPath(); ctx.moveTo(32,32); ctx.lineTo(32+Math.cos(a)*27, 32+Math.sin(a)*27); ctx.stroke();
  }
  return new THREE.CanvasTexture(c);
}
const rimTexture = makeRimTexture();

/* ---------------- mesh builders (plain Three.js, mounted via <primitive>) ---------------- */
function buildTrackMesh(track){
  const N = track.n;
  const positions=[], uvs=[], indices=[];
  let vAcc = 0;
  for(let i=0;i<=N;i++){
    const li = track.left[i%N], ri = track.right[i%N];
    positions.push(li.x, li.y+0.02, li.z,  ri.x, ri.y+0.02, ri.z);
    uvs.push(0, vAcc, 1, vAcc);
    if(i<N){
      const a=track.points[i%N], b=track.points[(i+1)%N];
      vAcc += Math.hypot(b.x-a.x,b.z-a.z)/8;
    }
  }
  for(let i=0;i<N;i++){
    const a=i*2, b=i*2+1, c=(i+1)*2, d=(i+1)*2+1;
    indices.push(a,b,c, b,d,c);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ map:asphaltTexture, roughness:0.92 });
  return new THREE.Mesh(geo, mat);
}

function buildCurbMesh(boundaryPts, track){
  const N = track.n;
  const positions=[], colors=[], indices=[];
  const curbWidth = 1.1;
  const colorA = new THREE.Color(0xffffff), colorB = new THREE.Color(0xdd2222);
  for(let i=0;i<=N;i++){
    const p = boundaryPts[i%N];
    const prev = boundaryPts[(i-1+N)%N], next = boundaryPts[(i+1)%N];
    const tx=next.x-prev.x, tz=next.z-prev.z; const len=Math.hypot(tx,tz)||1;
    const nx=-tz/len, nz=tx/len;
    const outer = { x:p.x+nx*curbWidth, z:p.z+nz*curbWidth };
    positions.push(p.x, p.y+0.03, p.z,  outer.x, p.y+0.03, outer.z);
    const col = (Math.floor(i/3)%2===0) ? colorA : colorB;
    colors.push(col.r,col.g,col.b, col.r,col.g,col.b);
  }
  for(let i=0;i<N;i++){
    const a=i*2, b=i*2+1, c=(i+1)*2, d=(i+1)*2+1;
    indices.push(a,b,c, b,d,c);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions,3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors,3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ vertexColors:true, roughness:0.8 });
  return new THREE.Mesh(geo, mat);
}

function buildFinishLine(track){
  const l = track.left[0], r = track.right[0];
  const geo = new THREE.PlaneGeometry(1, track.width);
  const c = document.createElement('canvas'); c.width=8; c.height=8;
  const cctx = c.getContext('2d');
  cctx.fillStyle='#111'; cctx.fillRect(0,0,8,8);
  cctx.fillStyle='#eee'; cctx.fillRect(0,0,4,4); cctx.fillRect(4,4,4,4);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.magFilter=THREE.NearestFilter;
  tex.repeat.set(1,6);
  const mat = new THREE.MeshStandardMaterial({ map:tex });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set((l.x+r.x)/2, track.points[0].y+0.04, (l.z+r.z)/2);
  const next = track.points[1];
  const angle = Math.atan2(next.z-track.points[0].z, next.x-track.points[0].x);
  mesh.rotation.x = -Math.PI/2;
  mesh.rotation.z = -angle;
  return mesh;
}

function buildTrackGroup(track){
  const g = new THREE.Group();
  g.add(buildTrackMesh(track));
  g.add(buildCurbMesh(track.left, track));
  g.add(buildCurbMesh(track.right, track));
  g.add(buildFinishLine(track));
  return g;
}

const CAR_PROFILE = [
  [-3.8,0.35],[-3.8,0.75],[-3.0,0.95],[-1.6,1.15],[-0.8,1.25],
  [0.6,1.25],[1.3,1.0],[2.4,0.55],[3.4,0.45],[3.8,0.4],
  [3.8,0.2],[3.0,0.15],[-3.0,0.15],
];
const CAR_WIDTH = 3.6;

function buildCarMesh(color){
  const group = new THREE.Group();

  const shape = new THREE.Shape();
  CAR_PROFILE.forEach(([x,y],i) => { if(i===0) shape.moveTo(x,y); else shape.lineTo(x,y); });
  shape.closePath();
  const bodyGeo = new THREE.ExtrudeGeometry(shape, { depth: CAR_WIDTH, bevelEnabled:false, curveSegments:1 });
  bodyGeo.translate(0,0,-CAR_WIDTH/2);
  bodyGeo.computeVertexNormals();
  const bodyMat = new THREE.MeshPhysicalMaterial({ map: makeCarPaintTexture(color), metalness:0.6, roughness:0.35, clearcoat:1.0, clearcoatRoughness:0.12 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.y = Math.PI/2;
  group.add(body);

  const glassMat = new THREE.MeshPhysicalMaterial({ color:0x0a1a22, transparent:true, opacity:0.55, roughness:0.1, metalness:0.1 });
  const cabinGlass = new THREE.Mesh(new THREE.BoxGeometry(CAR_WIDTH-0.3, 0.32, 2.9), glassMat);
  cabinGlass.position.set(0, 1.13, -0.15);
  group.add(cabinGlass);

  const headMat = new THREE.MeshStandardMaterial({ color:0xfff6d0, emissive:0xfff6d0, emissiveIntensity:1.1 });
  const tailMat = new THREE.MeshStandardMaterial({ color:0xff2020, emissive:0xff2020, emissiveIntensity:0.9 });
  [-0.9, 0.9].forEach(xOff => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.18,0.15), headMat);
    hl.position.set(xOff, 0.55, -3.78);
    group.add(hl);
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.4,0.18,0.15), tailMat);
    tl.position.set(xOff, 0.6, 3.78);
    group.add(tl);
  });

  const tireMat = new THREE.MeshStandardMaterial({ color:0x1a1a1a, roughness:0.9 });
  const rimMat = new THREE.MeshStandardMaterial({ map: rimTexture, metalness:0.7, roughness:0.35 });
  const wheelDefs = [
    { x:1.5,  z:-2.5, front:true  }, { x:-1.5, z:-2.5, front:true  },
    { x:1.5,  z:2.4,  front:false }, { x:-1.5, z:2.4,  front:false },
  ];
  const wheels = wheelDefs.map(p => {
    const pivot = new THREE.Group();
    pivot.position.set(p.x, 0.55, p.z);
    const spin = new THREE.Group();
    pivot.add(spin);
    const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.55,0.55,0.38,14), [tireMat, rimMat, rimMat]);
    mesh.rotation.z = Math.PI/2;
    spin.add(mesh);
    group.add(pivot);
    return { pivot, spin, front:p.front };
  });

  return { group, wheels, bodyMat };
}

function disposeBuilt(built){
  built.group.traverse(o => {
    if(o.geometry) o.geometry.dispose();
    if(o.material) o.material.dispose();
  });
}

/* ---------------- physics (pure functions, unchanged whether driven by rAF or useFrame) ---------------- */
function updateCarPhysics(car, throttle, brakeReverse, steer, delta, onTrack, turnRateMul){
  turnRateMul = turnRateMul || 1;
  car.steerVisual = steer;
  const speedCap = onTrack ? car.maxSpeed : car.maxSpeed*0.42;
  if(brakeReverse){
    car.speed -= car.brakeDecel*delta;
  } else if(throttle){
    car.speed += car.accel*delta;
  } else {
    const drag = car.accel*0.6*delta;
    if(Math.abs(car.speed)<=drag) car.speed=0; else car.speed -= Math.sign(car.speed)*drag;
  }
  const minSpeed = -car.maxSpeed*0.35;
  car.speed = Math.max(minSpeed, Math.min(speedCap, car.speed));
  const turnFactor = Math.max(0.2, Math.min(1, Math.abs(car.speed)/car.maxSpeed));
  car.angle += Math.max(-1,Math.min(1,steer)) * car.turnRate * turnRateMul * turnFactor * delta;
  car.x += Math.cos(car.angle)*car.speed*delta;
  car.z += Math.sin(car.angle)*car.speed*delta;
}

function nearestIndex(track, pos, hint){
  const N = track.n;
  if(hint == null){
    let bestI=0, bestD=Infinity;
    for(let i=0;i<N;i++){
      const p=track.points[i];
      const dx=p.x-pos.x, dz=p.z-pos.z;
      const d=dx*dx+dz*dz;
      if(d<bestD){ bestD=d; bestI=i; }
    }
    return { index:bestI, dist:Math.sqrt(bestD) };
  }
  const window = 30;
  let bestI=hint, bestD=Infinity;
  for(let o=-window;o<=window;o++){
    const i = ((hint+o)%N+N)%N;
    const p=track.points[i];
    const dx=p.x-pos.x, dz=p.z-pos.z;
    const d=dx*dx+dz*dz;
    if(d<bestD){ bestD=d; bestI=i; }
  }
  return { index:bestI, dist:Math.sqrt(bestD) };
}

function updateAI(car, track, diff, delta, time, index){
  const N = track.n;
  const t1 = track.points[(index+diff.lookahead)%N];
  const t2 = track.points[(index+diff.lookahead*2)%N];
  const wobble = Math.sin(time*0.6 + car.seed) * diff.jitterAmp * track.width * 0.5;
  const perpX = -(t2.z-t1.z), perpZ = (t2.x-t1.x);
  const plen = Math.hypot(perpX,perpZ)||1;
  const targetX = t1.x + (perpX/plen)*wobble;
  const targetZ = t1.z + (perpZ/plen)*wobble;
  const desiredAngle = Math.atan2(targetZ-car.z, targetX-car.x);
  const angleDiff = normalizeAngle(desiredAngle-car.angle);
  const steer = Math.max(-1, Math.min(1, angleDiff*2.5));
  const dirA = Math.atan2(t1.z-car.z, t1.x-car.x);
  const dirB = Math.atan2(t2.z-t1.z, t2.x-t1.x);
  const turnSharpness = Math.abs(normalizeAngle(dirB-dirA));
  const speedFraction = Math.max(0.35, 1 - turnSharpness*0.9);
  const targetSpeed = car.maxSpeed*diff.speedMul*speedFraction;
  const speedDiffV = targetSpeed-car.speed;
  const throttle = speedDiffV>5, brakeReverse = speedDiffV<-5;
  return { throttle, brakeReverse, steer };
}

function resolveCarCollisions(cars){
  const R = 8.5;
  for(let i=0;i<cars.length;i++){
    for(let j=i+1;j<cars.length;j++){
      const a=cars[i], b=cars[j];
      const dx=b.x-a.x, dz=b.z-a.z;
      const dist=Math.hypot(dx,dz)||0.001;
      if(dist<R){
        const overlap=(R-dist)/2;
        const nx=dx/dist, nz=dz/dist;
        a.x -= nx*overlap; a.z -= nz*overlap;
        b.x += nx*overlap; b.z += nz*overlap;
        a.speed *= 0.85; b.speed *= 0.85;
      }
    }
  }
}

function formatTime(t){
  const m = Math.floor(t/60);
  const s = (t%60).toFixed(1).padStart(4,'0');
  return `${m}:${s}`;
}

function makeCarObjects(track){
  return {
    idx: 0,
    build(carDef, gridIndex){
      const N = track.n;
      const row = Math.floor(gridIndex/2);
      const side = (gridIndex%2===0) ? 1 : -1;
      const idx = ((0 - row*4) % N + N) % N;
      const p = track.points[idx];
      const next = track.points[(idx+1)%N];
      const tx=next.x-p.x, tz=next.z-p.z, tl=Math.hypot(tx,tz)||1;
      const nx=-tz/tl, nz=tx/tl;
      return Object.assign({}, carDef, {
        x: p.x + nx*side*(track.width*0.22),
        z: p.z + nz*side*(track.width*0.22),
        angle: Math.atan2(tz,tx),
        speed: 0, lap: 0, lastIndex: idx, trackIndex: idx, progress: 0,
        finished: false, finishTime: null, worldY: p.y, renderY: p.y,
      });
    },
  };
}

/* ================= R3F scene components ================= */

function TrackMesh({ track }){
  const group = useMemo(() => buildTrackGroup(track), [track]);
  useEffect(() => () => { group.traverse(o => { if(o.geometry) o.geometry.dispose(); if(o.material) o.material.dispose(); }); }, [group]);
  return html`<primitive object=${group} />`;
}

function Ground(){
  const mesh = useMemo(() => {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(1400,1400), new THREE.MeshStandardMaterial({ map:grassTexture, roughness:1 }));
    m.rotation.x = -Math.PI/2;
    return m;
  }, []);
  return html`<primitive object=${mesh} />`;
}

function CarModel({ color, onReady }){
  const built = useMemo(() => buildCarMesh(color), [color]);
  useEffect(() => {
    onReady(built);
    return () => disposeBuilt(built);
  }, [built]);
  return html`<primitive object=${built.group} />`;
}

function RaceWorld({ carEntry, track, difficulty, onFinish, hudRefs, minimapCanvasRef }){
  const { camera } = useThree();
  const carsRef = useRef(null);
  const meshRefs = useRef([]);
  const phaseRef = useRef('countdown');
  const countdownRef = useRef(3.999);
  const raceTimeRef = useRef(0);
  const camStateRef = useRef({ x:0, y:5, z:20, angle:0 });
  const keysRef = useRef({});
  const finishedRef = useRef(false);

  // Computed once (not in an effect) so the AI roster/colors are known during the
  // very first render -- CarModel reads car.color synchronously for its paint texture,
  // and it must match the same car object the physics loop drives.
  const carDefs = useMemo(() => {
    const player = Object.assign({ isPlayer:true, name:ROSTER[carEntry.playerIdx].name, color:ROSTER[carEntry.playerIdx].color }, statsFor(ROSTER[carEntry.playerIdx]));
    const pool = ROSTER.filter((_,i) => i !== carEntry.playerIdx).sort(() => Math.random()-0.5);
    const aiCars = [];
    for(let i=0;i<AI_COUNT;i++){
      const entry = pool[i % pool.length];
      aiCars.push(Object.assign({ isPlayer:false, name:entry.name, color:entry.color, seed: Math.random()*100 }, statsFor(entry)));
    }
    return [player, ...aiCars];
  }, []);

  useEffect(() => {
    if(!carsRef.current){
      const factory = makeCarObjects(track);
      carsRef.current = carDefs.map((def, i) => factory.build(def, i));
      const player = carsRef.current[0];
      camStateRef.current.x = player.x; camStateRef.current.z = player.z; camStateRef.current.angle = player.angle;
    }
  }, []);

  useEffect(() => {
    const onDown = e => { keysRef.current[e.code] = true; };
    const onUp = e => { keysRef.current[e.code] = false; };
    window.addEventListener('keydown', onDown);
    window.addEventListener('keyup', onUp);
    return () => { window.removeEventListener('keydown', onDown); window.removeEventListener('keyup', onUp); };
  }, []);

  useFrame((state, rawDelta) => {
    const cars = carsRef.current;
    if(!cars) return;
    const delta = Math.min(rawDelta, 0.1);
    const keys = keysRef.current;

    if(phaseRef.current === 'countdown'){
      countdownRef.current -= delta;
      const countdownEl = hudRefs.current.countdownEl;
      if(countdownRef.current > 0){
        if(countdownEl) countdownEl.textContent = String(Math.ceil(countdownRef.current));
      } else if(countdownRef.current > -1){
        if(countdownEl) countdownEl.textContent = 'GO!';
      } else {
        if(countdownEl) countdownEl.classList.add('hidden');
        phaseRef.current = 'racing';
      }
    }

    const racing = phaseRef.current === 'racing';
    if(racing) raceTimeRef.current += delta;

    cars.forEach((car, ci) => {
      const { index, dist } = nearestIndex(track, car, car.trackIndex);
      car.trackIndex = index;
      const onTrack = dist <= track.width/2;
      car.worldY = track.points[index].y;

      if(racing){
        if(car.isPlayer){
          const throttle = !!keys['KeyW'];
          const brakeReverse = !!keys['KeyS'];
          const steer = (keys['KeyD']?1:0) - (keys['KeyA']?1:0);
          updateCarPhysics(car, throttle, brakeReverse, steer, delta, onTrack);
        } else {
          const decision = updateAI(car, track, difficulty, delta, state.clock.elapsedTime, index);
          updateCarPhysics(car, decision.throttle, decision.brakeReverse, decision.steer, delta, onTrack, difficulty.turnRateMul);
        }

        if(!car.finished){
          if(car.lastIndex - index > track.n*0.6){
            car.lap++;
            if(car.lap>=LAPS_TOTAL){ car.finished=true; car.finishTime=raceTimeRef.current; }
          }
          car.lastIndex = index;
          car.progress = car.lap*track.length + track.cum[index];
        }
      }

      const mesh = meshRefs.current[ci];
      if(mesh){
        car.renderY += (car.worldY - car.renderY) * Math.min(1, delta*10);
        mesh.group.position.set(car.x, car.renderY, car.z);
        mesh.group.rotation.y = -car.angle;
        const spinDelta = -(car.speed/0.55)*delta;
        mesh.wheels.forEach(w => {
          w.spin.rotation.x += spinDelta;
          if(w.front) w.pivot.rotation.y = (car.steerVisual||0) * 0.4;
        });
      }
    });

    if(racing) resolveCarCollisions(cars);

    const player = cars[0];
    const camState = camStateRef.current;
    camState.angle += normalizeAngle(player.angle-camState.angle) * Math.min(1, delta*4);
    const chaseDist = 9, chaseHeight = 3.4, lookAheadDist = 7;
    const fx = Math.cos(camState.angle), fz = Math.sin(camState.angle);
    camState.x += (player.x - fx*chaseDist - camState.x) * Math.min(1, delta*6);
    camState.z += (player.z - fz*chaseDist - camState.z) * Math.min(1, delta*6);
    camState.y += (player.worldY + chaseHeight - camState.y) * Math.min(1, delta*6);
    camera.position.set(camState.x, camState.y, camState.z);
    camera.lookAt(player.x + fx*lookAheadDist, player.worldY+1.1, player.z + fz*lookAheadDist);

    if(racing && hudRefs.current){
      const standings = [...cars].sort((a,b) => b.progress - a.progress);
      const pos = standings.indexOf(player)+1;
      if(hudRefs.current.lapEl) hudRefs.current.lapEl.textContent = Math.min(player.lap+1, LAPS_TOTAL);
      if(hudRefs.current.posEl) hudRefs.current.posEl.textContent = pos;
      if(hudRefs.current.speedEl) hudRefs.current.speedEl.textContent = Math.max(0, Math.round(Math.abs(player.speed)*1.15));
    }

    if(minimapCanvasRef.current){
      const c = minimapCanvasRef.current;
      const mctx = c.getContext('2d');
      const w=150, h=110;
      mctx.clearRect(0,0,w,h);
      const bb=track.bbox;
      const s = Math.min(w/(bb.maxX-bb.minX), h/(bb.maxZ-bb.minZ))*0.9;
      const cx=w/2, cy=h/2;
      const midX=(bb.minX+bb.maxX)/2, midZ=(bb.minZ+bb.maxZ)/2;
      mctx.strokeStyle='#888'; mctx.lineWidth=2;
      mctx.beginPath();
      track.points.forEach((p,i)=>{
        const x=cx+(p.x-midX)*s, y=cy+(p.z-midZ)*s;
        if(i===0) mctx.moveTo(x,y); else mctx.lineTo(x,y);
      });
      mctx.closePath(); mctx.stroke();
      cars.forEach(c2 => {
        const x=cx+(c2.x-midX)*s, y=cy+(c2.z-midZ)*s;
        mctx.fillStyle = c2.isPlayer ? '#5bd6ff' : '#ff5555';
        mctx.beginPath(); mctx.arc(x,y,c2.isPlayer?3.2:2.2,0,Math.PI*2); mctx.fill();
      });
    }

    if(racing && player.finished && !finishedRef.current){
      finishedRef.current = true;
      const standings = [...cars].sort((a,b) => b.progress - a.progress);
      onFinish(standings.map(c => ({ name:c.name, isPlayer:c.isPlayer, finishTime:c.finishTime })));
    }
  });

  return html`
    <${Ground} />
    <hemisphereLight args=${[0xbfe3ff, 0x2c5a1f, 0.9]} />
    <directionalLight color=${0xfff3d6} intensity=${2.6} position=${[120,180,80]} />
    <ambientLight intensity=${0.35} />
    <${TrackMesh} track=${track} />
    ${carDefs.map((def,i) => html`
      <${CarModel} key=${i} color=${def.color} onReady=${(built) => { meshRefs.current[i] = built; }} />
    `)}
  `;
}

/* ================= HUD / minimap DOM (siblings of the canvas) ================= */
function RaceOverlay({ hudRefs, minimapCanvasRef }){
  return html`
    <div id="hud">
      <div class="tl">LAP <span ref=${el => hudRefs.current.lapEl = el}>1</span>/3</div>
      <div class="tr">POS <span ref=${el => hudRefs.current.posEl = el}>1</span>/${1+AI_COUNT}</div>
      <div class="bl"><span ref=${el => hudRefs.current.speedEl = el}>0</span> <span style=${{fontSize:'14px'}}>MPH</span></div>
    </div>
    <div id="countdown" ref=${el => hudRefs.current.countdownEl = el}>3</div>
    <canvas id="minimapCanvas" width="150" height="110" ref=${minimapCanvasRef}></canvas>
  `;
}

/* ================= menu screens ================= */
function TitleScreen({ onStart }){
  return html`
    <div class="overlay">
      <h1>APEX CIRCUIT</h1>
      <p class="info">
        A 3D arcade racer in the spirit of the PS1 classics, chase-cam and all.<br/><br/>
        <span class="key">W</span> accelerate   <span class="key">S</span> brake / reverse   <span class="key">A</span> <span class="key">D</span> steer<br/><br/>
        Pick a car, pick a circuit, pick your rivals' skill — then win the race.
      </p>
      <div class="row"><button onClick=${onStart}>START</button></div>
    </div>
  `;
}

function CarSelectScreen({ selected, onSelect, onNext }){
  return html`
    <div class="overlay">
      <h2>SELECT YOUR CAR</h2>
      <div class="grid">
        ${ROSTER.map((c,i) => html`
          <div key=${i} class=${'cardbtn' + (selected===i?' selected':'')} onClick=${() => onSelect(i)}>
            <div class="name" style=${{color:c.color}}>${c.name}</div>
            <div class="cls">${c.cls}</div>
            <div class="statrow"><span class="label">SPEED</span><div class="statbar"><div class="fill" style=${{width:c.speed*20+'%'}}></div></div></div>
            <div class="statrow"><span class="label">ACCEL</span><div class="statbar"><div class="fill" style=${{width:c.accel*20+'%'}}></div></div></div>
            <div class="statrow"><span class="label">HANDLING</span><div class="statbar"><div class="fill" style=${{width:c.handling*20+'%'}}></div></div></div>
          </div>
        `)}
      </div>
      <div class="row"><button disabled=${selected==null} onClick=${onNext}>NEXT →</button></div>
    </div>
  `;
}

function drawTrackPreview(pctx, trk, w, h){
  pctx.clearRect(0,0,w,h);
  pctx.fillStyle='#0a2a12'; pctx.fillRect(0,0,w,h);
  const bb=trk.bbox;
  const s = Math.min(w/(bb.maxX-bb.minX), h/(bb.maxZ-bb.minZ))*0.85;
  const midX=(bb.minX+bb.maxX)/2, midZ=(bb.minZ+bb.maxZ)/2;
  const cx=w/2, cy=h/2;
  pctx.strokeStyle='#ccc'; pctx.lineWidth=6; pctx.lineJoin='round';
  pctx.beginPath();
  trk.points.forEach((p,i)=>{
    const x=cx+(p.x-midX)*s, y=cy+(p.z-midZ)*s;
    if(i===0) pctx.moveTo(x,y); else pctx.lineTo(x,y);
  });
  pctx.closePath(); pctx.stroke();
  const p0=trk.points[0];
  pctx.fillStyle='#fff';
  pctx.beginPath(); pctx.arc(cx+(p0.x-midX)*s, cy+(p0.z-midZ)*s, 4, 0, Math.PI*2); pctx.fill();
}

function TrackCard({ track, selected, onSelect }){
  const canvasRef = useRef(null);
  useEffect(() => { if(canvasRef.current) drawTrackPreview(canvasRef.current.getContext('2d'), track, 260, 150); }, []);
  return html`
    <div class=${'trackCard' + (selected?' selected':'')} onClick=${onSelect}>
      <canvas width="260" height="150" ref=${canvasRef}></canvas>
      <div class="name">${track.name}</div>
      <div class="meta">Length ~${Math.round(track.length)}m · Width ${track.width}m</div>
    </div>
  `;
}

function TrackSelectScreen({ selected, onSelect, onNext }){
  return html`
    <div class="overlay">
      <h2>SELECT CIRCUIT</h2>
      <div class="row">
        ${TRACKS.map((t,i) => html`<${TrackCard} key=${i} track=${t} selected=${selected===i} onSelect=${() => onSelect(i)} />`)}
      </div>
      <div class="row"><button disabled=${selected==null} onClick=${onNext}>NEXT →</button></div>
    </div>
  `;
}

function DifficultyScreen({ onSelect }){
  return html`
    <div class="overlay">
      <h2>SELECT OPPONENT SKILL</h2>
      <div class="row">
        ${Object.keys(DIFFICULTIES).map(key => html`
          <div key=${key} class="diffCard" onClick=${() => onSelect(key)}>
            <div class="name">${DIFFICULTIES[key].label}</div>
            <div class="desc">${DIFFICULTIES[key].desc}</div>
          </div>
        `)}
      </div>
    </div>
  `;
}

function ResultsScreen({ standings, onRaceAgain, onChangeSetup }){
  return html`
    <div class="overlay">
      <h2>RACE RESULTS</h2>
      <table>
        <tr><th>POS</th><th>DRIVER</th><th>TIME</th></tr>
        ${standings.map((c,i) => html`
          <tr key=${i} class=${c.isPlayer?'you':''}>
            <td>${i+1}</td><td>${c.name}${c.isPlayer?' (YOU)':''}</td><td>${c.finishTime!=null?formatTime(c.finishTime):'—'}</td>
          </tr>
        `)}
      </table>
      <div class="row">
        <button onClick=${onRaceAgain}>RACE AGAIN</button>
        <button onClick=${onChangeSetup}>CHANGE SETUP</button>
      </div>
    </div>
  `;
}

/* ================= App ================= */
function App(){
  const [screen, setScreen] = useState('title');
  const [carIdx, setCarIdx] = useState(null);
  const [trackIdx, setTrackIdx] = useState(null);
  const [difficultyKey, setDifficultyKey] = useState(null);
  const [standings, setStandings] = useState([]);
  const [raceKey, setRaceKey] = useState(0);

  const hudRefs = useRef({});
  const minimapCanvasRef = useRef(null);

  const racing = screen === 'race';

  return html`
    <a class="backlink" href="index.html">← ARCADE HUB</a>
    ${racing && html`
      <${Canvas} className="r3f-canvas" camera=${{ fov:68, near:0.1, far:600, position:[0,5,20] }}>
        <color attach="background" args=${[0x8fd0f0]} />
        <fog attach="fog" args=${[0x8fd0f0, 120, 420]} />
        <${RaceWorld}
          key=${raceKey}
          carEntry=${{ playerIdx: carIdx }}
          track=${TRACKS[trackIdx]}
          difficulty=${DIFFICULTIES[difficultyKey]}
          hudRefs=${hudRefs}
          minimapCanvasRef=${minimapCanvasRef}
          onFinish=${(finalStandings) => { setStandings(finalStandings); setScreen('results'); }}
        />
      <//>
      <${RaceOverlay} hudRefs=${hudRefs} minimapCanvasRef=${minimapCanvasRef} />
    `}
    ${screen==='title' && html`<${TitleScreen} onStart=${() => setScreen('carSelect')} />`}
    ${screen==='carSelect' && html`<${CarSelectScreen} selected=${carIdx} onSelect=${setCarIdx} onNext=${() => setScreen('trackSelect')} />`}
    ${screen==='trackSelect' && html`<${TrackSelectScreen} selected=${trackIdx} onSelect=${setTrackIdx} onNext=${() => setScreen('difficultySelect')} />`}
    ${screen==='difficultySelect' && html`<${DifficultyScreen} onSelect=${(key) => { setDifficultyKey(key); setRaceKey(k=>k+1); setScreen('race'); }} />`}
    ${screen==='results' && html`<${ResultsScreen} standings=${standings} onRaceAgain=${() => { setRaceKey(k=>k+1); setScreen('race'); }} onChangeSetup=${() => setScreen('carSelect')} />`}
  `;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
